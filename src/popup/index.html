<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Video Downloader</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header class="popup-header">
      <div class="popup-title">
        <svg class="popup-logo" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="11" fill="currentColor" opacity="0.12" />
          <path d="M11 6h2v7.2l2.6-2.6 1.4 1.4-5 5-5-5 1.4-1.4L11 13.2V6z" fill="currentColor" />
          <rect x="7" y="17" width="10" height="1.8" rx="0.9" fill="currentColor" />
        </svg>
        <h1>동영상 다운로드</h1>
        <span id="video-count" class="video-count" hidden></span>
      </div>
      <button id="rescan-button" type="button" title="페이지를 다시 스캔합니다">다시 스캔</button>
    </header>
    <main id="list-container" aria-live="polite"></main>
    <p id="status" class="status" role="status"></p>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
